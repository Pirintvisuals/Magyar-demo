<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foton Kft. · Azonnali Árajánlat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #111d30;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .page-center { text-align: center; color: #fff; user-select: none; }
    .logo-wrap {
      width: 80px; height: 80px; border-radius: 16px;
      overflow: hidden; margin: 0 auto 18px;
      border: 2px solid rgba(30,74,150,0.5);
      box-shadow: 0 0 0 4px rgba(30,74,150,0.2);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .logo-fallback {
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, #1e4a96, #3b6bc4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .company-name { font-size: 30px; font-weight: 800; letter-spacing: -0.6px; color: #fff; margin-bottom: 6px; }
    .company-sub { font-size: 13px; color: rgba(59,107,196,0.9); font-weight: 500; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px; }
    .tagline { font-size: 14px; color: rgba(255,255,255,0.35); font-weight: 400; }

    #widget-root { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }

    @keyframes chatOpen  { from { opacity:0; transform:translateY(32px) scale(.95) } to { opacity:1; transform:translateY(0) scale(1) } }
    @keyframes tooltipPop{ from { opacity:0; transform:scale(.88) translateY(8px) } to { opacity:1; transform:scale(1) translateY(0) } }
    @keyframes modalIn   { from { opacity:0; transform:scale(.94) translateY(20px) } to { opacity:1; transform:scale(1) translateY(0) } }

    .chat-panel {
      animation: chatOpen .42s cubic-bezier(.16,1,.3,1) both;
      width: 440px; height: clamp(480px, calc(100vh - 120px), 700px);
      display: flex; flex-direction: column;
      background: #fff; border-radius: 22px; overflow: hidden;
      box-shadow: 0 32px 96px rgba(0,0,0,.5), 0 8px 32px rgba(0,0,0,.22), 0 2px 8px rgba(30,74,150,.12);
    }
    .chat-header {
      background: linear-gradient(135deg, #111d30 0%, #1a3258 60%, #1e4a96 100%);
      padding: 14px 18px 13px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .msgs-scroll {
      flex: 1; overflow-y: auto; padding: 18px 14px 18px 16px;
      display: flex; flex-direction: column; gap: 8px;
      background: #f3f6fb;
      scrollbar-width: thin; scrollbar-color: rgba(30,74,150,.2) transparent;
    }
    .msgs-scroll::-webkit-scrollbar { width: 3px; }
    .msgs-scroll::-webkit-scrollbar-thumb { background: rgba(30,74,150,.2); border-radius: 10px; }

    .msg-agent { display: flex; align-items: flex-end; gap: 8px; }
    .msg-agent-bubble {
      background: #fff; color: #0f172a;
      border-radius: 18px 18px 18px 5px; padding: 11px 15px; max-width: 80%;
      font-size: 13.5px; line-height: 1.55;
      box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
    }
    .msg-user { display: flex; justify-content: flex-end; }
    .msg-user-bubble {
      background: linear-gradient(135deg, #1e4a96, #152e6a);
      color: #fff; border-radius: 18px 18px 5px 18px; padding: 11px 15px; max-width: 80%;
      font-size: 13.5px; line-height: 1.55;
      box-shadow: 0 2px 8px rgba(30,74,150,.4);
    }

    .qr-area { padding: 8px 14px 10px; background: #fff; border-top: 1px solid #dce9f8; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
    .qr-btn { padding: 6px 14px; background: #eff4ff; color: #1e4a96; border: 1px solid #c7d9f5; border-radius: 20px; font-size: 12.5px; font-weight: 600; cursor: default; font-family: inherit; }

    .input-area { padding: 10px 14px 10px; background: #fff; border-top: 1px solid #dce9f8; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-field { flex: 1; padding: 11px 16px; border-radius: 22px; border: 1.5px solid #bfd3f0; font-size: 13.5px; outline: none; background: #f3f6fb; color: #111827; font-family: inherit; }
    .send-btn { width: 42px; height: 42px; flex-shrink: 0; background: linear-gradient(135deg, #1e4a96, #152e6a); color: #fff; border: none; border-radius: 50%; cursor: not-allowed; display: flex; align-items: center; justify-content: center; opacity: .4; }

    .tooltip {
      animation: tooltipPop .26s cubic-bezier(.16,1,.3,1) both;
      background: #fff; color: #1e4a96; font-size: 13px; font-weight: 600;
      padding: 9px 16px; border-radius: 22px;
      box-shadow: 0 6px 24px rgba(0,0,0,.13), 0 2px 6px rgba(0,0,0,.07);
      white-space: nowrap; position: relative; letter-spacing: -.1px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    .tooltip::after { content:''; position:absolute; bottom:-7px; right:30px; width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:8px solid #fff; filter:drop-shadow(0 2px 2px rgba(0,0,0,.06)); }

    .bubble-btn { width: 62px; height: 62px; border-radius: 50%; border: 2.5px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s; padding: 0; }
    .bubble-btn:hover { transform: scale(1.07); }
    .bubble-open   { background: linear-gradient(135deg, #374151, #1f2937); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
    .bubble-closed { background: linear-gradient(135deg, #1e4a96, #111d30); box-shadow: 0 6px 24px rgba(30,74,150,.55), 0 2px 8px rgba(0,0,0,.2); }

    .close-btn { color: rgba(255,255,255,.8); background: rgba(255,255,255,.12); border: none; cursor: pointer; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s; }
    .close-btn:hover { opacity: .65; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(5,8,18,.88); backdrop-filter: blur(6px); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-card {
      animation: modalIn .38s cubic-bezier(.16,1,.3,1) both;
      background: #fff; border-radius: 22px; max-width: 460px; width: 100%;
      max-height: calc(100vh - 40px); overflow-y: auto;
      box-shadow: 0 48px 140px rgba(0,0,0,.65), 0 16px 48px rgba(0,0,0,.3);
      scrollbar-width: thin; scrollbar-color: rgba(30,74,150,.2) transparent;
    }
    .modal-card::-webkit-scrollbar { width: 3px; }
    .modal-card::-webkit-scrollbar-thumb { background: rgba(30,74,150,.22); border-radius: 10px; }
  </style>
</head>
<body>

  { r:'agent', t:'Rendben, 38 cm-es falhoz tokmélyítő elemet kalkulálok. Hány emeletes az épület, és szükség lesz-e állványra a beépítésnél?' },
  { r:'user',  t:'2 emeletes, szóval igen, állvány biztosan kell' },

  { r:'user',  t:'Nem, minden szabványos téglalap alakú nyílás' },
  { r:'agent', t:'Mikor kellene elkezdeni a beépítést? Van-e határidő a kivitelezési ütemhez?' },
  { r:'user',  t:'Őszig mindenképpen — a ház október végére zárt héjazatot kap' },
  { r:'agent', t:'Mi az irányítószáma az ingatlannak?' },
  { r:'user',  t:'9021' },
  { r:'agent', t:'Milyen kerettel számolnak az összes ablakra, ajtóra, redőnyre és beépítésre együtt?' },
  { r:'user',  t:'4 és 4,8 millió forint között' },
  { r:'agent', t:'A neve?' },
  { r:'user',  t:'Horváth Balázs' },
  { r:'agent', t:'Telefonszáma, Balázs?' },
  { r:'user',  t:'06 30 748 2193' },
  { r:'agent', t:'E-mail-cím?' },

  { r:'agent', t:'Köszönöm Balázs — összeállítom a teljes nyílászáró és redőny ajánlatot.' },
  { r:'estimate' }

const EST = {
  lower: 3_820_000, mid: 4_595_000, upper: 5_480_000,
  status: 'PRIORITÁS',
  items: [
    { label:'Rehau Synego 82 — 14 ablak anyag',              note:'6 kamrás PVC profil, antracit/fehér kétszínű, tokmélyítővel',  amt: 1_120_000 },
    { label:'Háromrétegű üveg (Ug=0.5) — 14 ablak',         note:'közel-nulla energiás standard, low-e bevonat, argon töltés',   amt:   385_000 },
    { label:'2× alumínium lift-slide teraszajtó',            note:'LD 90 rendszer, 240×220 + 180×220, antracit/fehér, hármas üveg', amt:   840_000 },
    { label:'Alumínium biztonsági bejárati ajtó RC3',        note:'betörésálló vasalat, 3 pontos zár, 100×210, antracit',         amt:   445_000 },
    { label:'Smart motoros integrált redőnytok — 14 ablak',  note:'okos-vezérlő kompatibilis, tokba épített alumínium redőny',    amt:   560_000 },
    { label:'Beépítés munkadíj (új beépítés, 2 szint)',      note:'állványozással, 38 cm Porotherm falhoz, tokmélyítő, ragasztás', amt:   480_000 },
    { label:'Belső-külső vakolásjavítás, fugázás',           note:'ablakperemy simítás és festés, kültéri pu-hab + fugázás',      amt:   175_000 },
    { label:'Belső ablakpárkányok (14 db, fehér műmárvány)', note:'egyedi méretvágás, ragasztással, él-idomok',                   amt:   125_000 },
    { label:'Szállítás + állványozás + projekt logisztika',  note:'2 szintes beépítés, szállítójármű, állványbérlés',             amt:    85_000 },
    { label:'Projekt menedzsment (6%)',                       note:'koordináció, energetikai dokumentáció, átadás-átvétel jkv.',   amt:   252_900 },
    { label:'Tartalék (3%)',                                  note:'3% előre nem látható munkákra és méretkülönbségekre',          amt:   126_450 },
  ],
  customer: {
    'Név':'Horváth Balázs',
    'Telefon':'06 30 748 2193',
    'E-mail':'horvath.balazs@gmail.com',
    'Irányítószám':'9021 — Győr',
    'Munka típusa':'Új beépítés — 14 ablak + 2 lift-slide + RC3 bejárat',
    'Saját keret':'4 000 000 – 4 800 000 Ft',
  },
  extras: [
    { icon:'🪟', label:'Profil',       val:'Rehau Synego 82 — 6 kamrás' },
    { icon:'🚪', label:'Ajtók',        val:'2× alu lift-slide + RC3 bejárat' },
    { icon:'🎨', label:'Szín',         val:'Antracit kívül / fehér belül' },
    { icon:'📱', label:'Redőny',       val:'Smart motoros, 14 ablak' },
  ],
  timing: 'Október vége — zárt héjazat határideje',
  score: 97, scoreLabel: 'Prémium Érdeklődő', scoreColor: '#111d30',
  clientCity: 'Győr', clientZip: '9021',
  companyCity: 'Győr', distanceKm: 5,

function huf(n) { return n.toLocaleString('hu-HU') + ' Ft' }
function esc(s) {
  if (!s && s !== 0) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

let isOpen = false, showModal = false

function render() {
  const existing = document.getElementById('ownerModal')
  if (existing) existing.remove()
  if (showModal) { const m = buildModal(); m.id = 'ownerModal'; document.body.appendChild(m) }
  const root = document.getElementById('widget-root')
  root.innerHTML = ''
  if (isOpen) root.appendChild(buildPanel())
  if (!isOpen) { const tip = document.createElement('div'); tip.className = 'tooltip'; tip.textContent = 'Azonnali árat kap?'; root.appendChild(tip) }
  root.appendChild(buildBubble())
}

function buildBubble() {
  const btn = document.createElement('button')
  btn.className = 'bubble-btn ' + (isOpen ? 'bubble-open' : 'bubble-closed')
  btn.innerHTML = isOpen
    ? `<svg viewBox="0 0 14 14" fill="none" style="width:16px;height:16px"><path d="M1 1l12 12M13 1L1 13" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" style="width:28px;height:28px"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/></svg>`
  btn.onclick = () => { isOpen = !isOpen; render(); if (isOpen) setTimeout(scrollBottom, 60) }
  return btn
}

function buildPanel() {
  const panel = document.createElement('div')
  panel.className = 'chat-panel'

  const hdr = document.createElement('header')
  hdr.className = 'chat-header'
  hdr.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:42px;height:42px;border-radius:10px;background:#fff;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
        <img src="https://graph.facebook.com/Foton.Kft/picture?type=normal"
             style="width:100%;height:100%;object-fit:cover"
             onerror="this.parentElement.innerHTML='<span style=&quot;font-size:16px;font-weight:900;color:#1e4a96&quot;>F</span>'" alt="logo">
      </div>
      <div>
        <div style="color:#fff;font-weight:700;font-size:14px;letter-spacing:-0.3px;line-height:1.2">Foton Kft.</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
          <div style="width:6px;height:6px;border-radius:50%;background:#34d399;box-shadow:0 0 0 2px rgba(52,211,153,.3)"></div>
          <span style="color:#bfd3f0;font-size:11px;font-weight:500">Online · Másodpercek alatt válaszol</span>
        </div>
      </div>
    </div>
    <button class="close-btn" id="closeBtn">
      <svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>`
  hdr.querySelector('#closeBtn').onclick = () => { isOpen = false; render() }
  panel.appendChild(hdr)

  const msgs = document.createElement('div')
  msgs.className = 'msgs-scroll'; msgs.id = 'msgsScroll'
  MSGS.forEach((msg, i) => {
    if (msg.r === 'agent') {
      const showAvatar = i === 0 || MSGS[i-1].r === 'user'
      const wrap = document.createElement('div'); wrap.className = 'msg-agent'
      wrap.innerHTML = `
        <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1e4a96,#111d30);flex-shrink:0;display:flex;align-items:center;justify-content:center;visibility:${showAvatar?'visible':'hidden'}">
          <svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px"><path d="M7 1C4.24 1 2 3.24 2 6c0 1.73.89 3.25 2.23 4.15L3.5 13 7 11.5l3.5 1.5-.73-2.85A5 5 0 0 0 12 6c0-2.76-2.24-5-5-5Z" fill="white"/></svg>
        </div>
        <div class="msg-agent-bubble">${esc(msg.t)}</div>`
      msgs.appendChild(wrap)
    } else if (msg.r === 'user') {
      const wrap = document.createElement('div'); wrap.className = 'msg-user'
      wrap.innerHTML = `<div class="msg-user-bubble">${esc(msg.t)}</div>`
      msgs.appendChild(wrap)
    } else if (msg.r === 'estimate') {
      msgs.appendChild(buildCostMessage())
    }
  })
  panel.appendChild(msgs)

  const qr = document.createElement('div'); qr.className = 'qr-area'
  ;['Ablakcsere','Teraszajtó','Bejárati ajtó','Redőny'].forEach(t => {
    const b = document.createElement('button'); b.className = 'qr-btn'; b.textContent = t; qr.appendChild(b)
  })
  panel.appendChild(qr)

  const inp = document.createElement('div'); inp.className = 'input-area'
  inp.innerHTML = `
    <div class="input-row">
      <input class="input-field" type="text" placeholder="Írjon üzenetet..." disabled>
      <button class="send-btn" disabled>
        <svg viewBox="0 0 20 20" fill="none" style="width:18px;height:18px;transform:translateX(1px)"><path d="M3 10L17 3l-4 7 4 7L3 10Z" fill="white"/></svg>
      </button>
    </div>`
  panel.appendChild(inp)
  panel.appendChild(buildSendBar())
  return panel
}

function scrollBottom() { const el = document.getElementById('msgsScroll'); if (el) el.scrollTop = el.scrollHeight }

function buildCostMessage() {
  const wrap = document.createElement('div')
  wrap.className = 'msg-agent'; wrap.style.cssText = 'align-items:flex-start;'

  const avatar = document.createElement('div')
  avatar.style.cssText = 'width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1e4a96,#111d30);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;'

    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px;">

  wrap.appendChild(avatar); wrap.appendChild(bubble)
  return wrap

function buildSendBar() {
  const bar = document.createElement('div')
  bar.style.cssText = 'background:#fff;border-top:1.5px solid #bfd3f0;flex-shrink:0;padding:10px 14px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;'

  const left = document.createElement('div')
  left.innerHTML = `
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#6b7280;font-weight:700;margin-bottom:1px">Becsült ajánlat</div>
    <div style="font-size:20px;font-weight:900;color:#111d30;letter-spacing:-1px;line-height:1">${huf(EST.mid)}</div>`

  const btn = document.createElement('button')
  btn.textContent = 'Elküldés a tulajdonosnak →'
  btn.style.cssText = 'background:linear-gradient(135deg,#1e4a96,#152e6a);color:#fff;border:none;border-radius:10px;padding:10px 15px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 3px 10px rgba(30,74,150,.4);flex-shrink:0;'
  btn.onclick = () => { showModal = true; render() }

  bar.appendChild(left); bar.appendChild(btn)
  return bar
}

                <span style="font-size:12px;font-weight:700;color:#1e4a96;background:#eff4ff;padding:3px 10px;border-radius:20px">📞 06 30 748 2193</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Location -->

  card.querySelector('#modalClose').onclick = () => { showModal = false; render() }

  return overlay
