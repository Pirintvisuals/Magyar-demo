<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lakásfelújítás Miskolc · Azonnali Árajánlat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0e1c2e;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .page-center { text-align: center; color: #fff; user-select: none; }
    .logo-wrap {
      width: 80px; height: 80px; border-radius: 16px;
      overflow: hidden; margin: 0 auto 18px;
      border: 2px solid rgba(41,171,226,.45);
      box-shadow: 0 0 0 4px rgba(41,171,226,.15);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .logo-fallback { font-size: 26px; font-weight: 900; background: linear-gradient(135deg,#29abe2,#0d7aaf); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .company-name { font-size: 28px; font-weight: 800; letter-spacing: -.6px; color: #fff; margin-bottom: 6px; }
    .company-sub { font-size: 13px; color: rgba(41,171,226,.9); font-weight: 500; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px; }
    .tagline { font-size: 14px; color: rgba(255,255,255,.35); font-weight: 400; }

    #widget-root { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }

    @keyframes chatOpen  { from { opacity:0; transform:translateY(32px) scale(.95) } to { opacity:1; transform:translateY(0) scale(1) } }
    @keyframes tooltipPop{ from { opacity:0; transform:scale(.88) translateY(8px) } to { opacity:1; transform:scale(1) translateY(0) } }
    @keyframes modalIn   { from { opacity:0; transform:scale(.94) translateY(20px) } to { opacity:1; transform:scale(1) translateY(0) } }

    .chat-panel {
      animation: chatOpen .42s cubic-bezier(.16,1,.3,1) both;
      width: 440px; height: clamp(480px, calc(100vh - 120px), 700px);
      display: flex; flex-direction: column;
      background: #fff; border-radius: 22px; overflow: hidden;
      box-shadow: 0 32px 96px rgba(0,0,0,.52), 0 8px 32px rgba(0,0,0,.22), 0 2px 8px rgba(41,171,226,.1);
    }
    .chat-header {
      background: linear-gradient(135deg, #0e1c2e 0%, #143d5c 60%, #1a6a9a 100%);
      padding: 14px 18px 13px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .msgs-scroll {
      flex: 1; overflow-y: auto; padding: 18px 14px 18px 16px;
      display: flex; flex-direction: column; gap: 8px;
      background: #f0f8fc;
      scrollbar-width: thin; scrollbar-color: rgba(41,171,226,.25) transparent;
    }
    .msgs-scroll::-webkit-scrollbar { width: 3px; }
    .msgs-scroll::-webkit-scrollbar-thumb { background: rgba(41,171,226,.25); border-radius: 10px; }

    .msg-agent { display: flex; align-items: flex-end; gap: 8px; }
    .msg-agent-bubble { background: #fff; color: #0f172a; border-radius: 18px 18px 18px 5px; padding: 11px 15px; max-width: 80%; font-size: 13.5px; line-height: 1.55; box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04); }
    .msg-user { display: flex; justify-content: flex-end; }
    .msg-user-bubble { background: linear-gradient(135deg, #1a7ab5, #0e3d5c); color: #fff; border-radius: 18px 18px 5px 18px; padding: 11px 15px; max-width: 80%; font-size: 13.5px; line-height: 1.55; box-shadow: 0 2px 8px rgba(26,122,181,.4); }

    .qr-area { padding: 8px 14px 10px; background: #fff; border-top: 1px solid #d0eaf8; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
    .qr-btn { padding: 6px 14px; background: #e8f6fd; color: #0d7aaf; border: 1px solid #a5d8ef; border-radius: 20px; font-size: 12.5px; font-weight: 600; cursor: default; font-family: inherit; }

    .input-area { padding: 10px 14px 10px; background: #fff; border-top: 1px solid #d0eaf8; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-field { flex: 1; padding: 11px 16px; border-radius: 22px; border: 1.5px solid #a5d8ef; font-size: 13.5px; outline: none; background: #f0f8fc; color: #111827; font-family: inherit; }
    .send-btn { width: 42px; height: 42px; flex-shrink: 0; background: linear-gradient(135deg, #29abe2, #0d7aaf); color: #fff; border: none; border-radius: 50%; cursor: not-allowed; display: flex; align-items: center; justify-content: center; opacity: .4; }

    .tooltip { animation: tooltipPop .26s cubic-bezier(.16,1,.3,1) both; background: #fff; color: #0d7aaf; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 22px; box-shadow: 0 6px 24px rgba(0,0,0,.13), 0 2px 6px rgba(0,0,0,.07); white-space: nowrap; position: relative; letter-spacing: -.1px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .tooltip::after { content:''; position:absolute; bottom:-7px; right:30px; width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:8px solid #fff; filter:drop-shadow(0 2px 2px rgba(0,0,0,.06)); }

    .bubble-btn { width: 62px; height: 62px; border-radius: 50%; border: 2.5px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s; padding: 0; }
    .bubble-btn:hover { transform: scale(1.07); }
    .bubble-open   { background: linear-gradient(135deg,#374151,#1f2937); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
    .bubble-closed { background: linear-gradient(135deg,#29abe2,#0d4a6e); box-shadow: 0 6px 24px rgba(41,171,226,.5), 0 2px 8px rgba(0,0,0,.2); }

    .close-btn { color: rgba(255,255,255,.8); background: rgba(255,255,255,.12); border: none; cursor: pointer; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s; }
    .close-btn:hover { opacity: .65; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(5,10,18,.88); backdrop-filter: blur(6px); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-card { animation: modalIn .38s cubic-bezier(.16,1,.3,1) both; background: #fff; border-radius: 22px; max-width: 460px; width: 100%; max-height: calc(100vh - 40px); overflow-y: auto; box-shadow: 0 48px 140px rgba(0,0,0,.65), 0 16px 48px rgba(0,0,0,.3); scrollbar-width: thin; scrollbar-color: rgba(41,171,226,.2) transparent; }
    .modal-card::-webkit-scrollbar { width: 3px; }
    .modal-card::-webkit-scrollbar-thumb { background: rgba(41,171,226,.22); border-radius: 10px; }
  </style>
</head>

  { r:'agent', t:'Milyen kerettel számol a teljes felújításra?' },
  { r:'user',  t:'4,5 és 5,5 millió forint között' },
  { r:'agent', t:'A neve?' },
  { r:'user',  t:'Szalai Mónika' },
  { r:'agent', t:'Telefonszáma, Mónika?' },
  { r:'user',  t:'06 30 215 8844' },

  { r:'agent', t:'Köszönöm Mónika — összeállítom a teljes lakásfelújítási ajánlatot.' },
  { r:'estimate' }

const EST = {
  lower: 4_180_000, mid: 5_063_000, upper: 6_080_000,
  status: 'PRIORITÁS',
  items: [
    { label:'Teljes glettelés + kétrétegű festés (85 m²)',           note:'repedések javítása, alapozás, 2 réteg prémium falfesték',      amt:   620_000 },
    { label:'Fürdőszoba teljes burkolás (prémium csempe)',           note:'12 m² fal + 5 m² padló, 60×120 porcelán, fugázással',         amt:   450_000 },
    { label:'Fürdőszoba sanitér csere (szabadonálló kád)',           note:'szabadonálló kád, mosdóbútor, WC, törölközőszárító radiátor', amt:   520_000 },
    { label:'Fürdőszoba vízvezeték teljes átépítés (acél → PPR)',   note:'teljes csőcsere, új csatlakozások, tömítéssel átadás',         amt:   280_000 },
    { label:'WC teljes felújítás (burkolat + sanitér)',              note:'csempézés, WC csésze, tartály, mosdó, csap, szifon',           amt:   320_000 },
    { label:'Konyha alap — csempe, padló, elektromos, vízvezeték',  note:'falcsempe, padlócsempe, csatlakozók, csőcsatlakozás',          amt:   420_000 },
    { label:'Laminált padló csere (60 m², Egger 10 mm AC5)',         note:'szobák + folyosó, lábléc, küszöbprofil, ragasztószalag',      amt:   380_000 },
    { label:'Elektromos rendszer teljes korszerűsítés',              note:'elosztótábla, FI-relé, kismegszakítók, teljes kábelcsere',    amt:   580_000 },
    { label:'6 db belső ajtó csere (MDF, tokkal, festett)',          note:'6 kamrás tok, zsanér, kilincs, tömítés, barkács-festett',     amt:   540_000 },
    { label:'Előszoba gipszkarton álmennyezet + rejtett LED',        note:'kétszintes álmennyezet, gipszkarton, LED szalag, spotok',     amt:   225_000 },
    { label:'5 db radiátor csere (lapos acél, termosztáttal)',       note:'acél lapradiátor, termosztátfej, légtelenítő, festett',       amt:   310_000 },
    { label:'Projekt menedzsment (6%)',                               note:'koordináció, anyagbeszerzés, műszaki felügyelet, dokumentáció', amt: 278_700 },
    { label:'Tartalék (3%)',                                          note:'3% előre nem látható munkákra és anyageltérésekre',           amt:   139_350 },
  ],
  customer: {

    'Telefon':'06 30 215 8844',

function huf(n) { return n.toLocaleString('hu-HU') + ' Ft' }
function esc(s) {
  if (!s && s !== 0) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

let isOpen = false, showModal = false

function render() {
  const existing = document.getElementById('ownerModal')
  if (existing) existing.remove()
  if (showModal) { const m = buildModal(); m.id = 'ownerModal'; document.body.appendChild(m) }
  const root = document.getElementById('widget-root')
  root.innerHTML = ''
  if (isOpen) root.appendChild(buildPanel())
  if (!isOpen) { const tip = document.createElement('div'); tip.className = 'tooltip'; tip.textContent = 'Azonnali árat kap?'; root.appendChild(tip) }
  root.appendChild(buildBubble())
}

function buildBubble() {
  const btn = document.createElement('button')
  btn.className = 'bubble-btn ' + (isOpen ? 'bubble-open' : 'bubble-closed')
  btn.innerHTML = isOpen
    ? `<svg viewBox="0 0 14 14" fill="none" style="width:16px;height:16px"><path d="M1 1l12 12M13 1L1 13" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" style="width:28px;height:28px"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/></svg>`
  btn.onclick = () => { isOpen = !isOpen; render(); if (isOpen) setTimeout(scrollBottom, 60) }
  return btn
}

function buildPanel() {
  const panel = document.createElement('div')
  panel.className = 'chat-panel'

  const hdr = document.createElement('header')
  hdr.className = 'chat-header'
  hdr.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:42px;height:42px;border-radius:10px;background:#fff;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
        <img src="https://graph.facebook.com/lakasfelujitasmiskolchu/picture?type=normal"
             style="width:100%;height:100%;object-fit:cover"
             onerror="this.parentElement.innerHTML='<span style=&quot;font-size:11px;font-weight:900;color:#29abe2&quot;>LM</span>'" alt="logo">
      </div>
      <div>
        <div style="color:#fff;font-weight:700;font-size:13.5px;letter-spacing:-0.3px;line-height:1.2">Lakásfelújítás Miskolc</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
          <div style="width:6px;height:6px;border-radius:50%;background:#34d399;box-shadow:0 0 0 2px rgba(52,211,153,.3)"></div>
          <span style="color:#a5d8ef;font-size:11px;font-weight:500">Online · Másodpercek alatt válaszol</span>
        </div>
      </div>
    </div>
    <button class="close-btn" id="closeBtn">
      <svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>`
  hdr.querySelector('#closeBtn').onclick = () => { isOpen = false; render() }
  panel.appendChild(hdr)

  const msgs = document.createElement('div')
  msgs.className = 'msgs-scroll'; msgs.id = 'msgsScroll'
  MSGS.forEach((msg, i) => {
    if (msg.r === 'agent') {
      const showAvatar = i === 0 || MSGS[i-1].r === 'user'
      const wrap = document.createElement('div'); wrap.className = 'msg-agent'
      wrap.innerHTML = `
        <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#29abe2,#0d4a6e);flex-shrink:0;display:flex;align-items:center;justify-content:center;visibility:${showAvatar?'visible':'hidden'}">
          <svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px"><path d="M7 1C4.24 1 2 3.24 2 6c0 1.73.89 3.25 2.23 4.15L3.5 13 7 11.5l3.5 1.5-.73-2.85A5 5 0 0 0 12 6c0-2.76-2.24-5-5-5Z" fill="white"/></svg>
        </div>
        <div class="msg-agent-bubble">${esc(msg.t)}</div>`
      msgs.appendChild(wrap)
    } else if (msg.r === 'user') {
      const wrap = document.createElement('div'); wrap.className = 'msg-user'
      wrap.innerHTML = `<div class="msg-user-bubble">${esc(msg.t)}</div>`
      msgs.appendChild(wrap)
    } else if (msg.r === 'estimate') {
      msgs.appendChild(buildCostMessage())
    }
  })
  panel.appendChild(msgs)

  const qr = document.createElement('div'); qr.className = 'qr-area'
  ;['Teljes felújítás','Fürdőszoba','Festés','Elektromos'].forEach(t => {
    const b = document.createElement('button'); b.className = 'qr-btn'; b.textContent = t; qr.appendChild(b)
  })
  panel.appendChild(qr)

  const inp = document.createElement('div'); inp.className = 'input-area'
  inp.innerHTML = `<div class="input-row">
    <input class="input-field" type="text" placeholder="Írjon üzenetet..." disabled>
    <button class="send-btn" disabled><svg viewBox="0 0 20 20" fill="none" style="width:18px;height:18px;transform:translateX(1px)"><path d="M3 10L17 3l-4 7 4 7L3 10Z" fill="white"/></svg></button>
  </div>`
  panel.appendChild(inp)
  panel.appendChild(buildSendBar())
  return panel
}

function scrollBottom() { const el = document.getElementById('msgsScroll'); if (el) el.scrollTop = el.scrollHeight }

function buildCostMessage() {
  const wrap = document.createElement('div')

  wrap.appendChild(avatar); wrap.appendChild(bubble)

function buildSendBar() {
  const bar = document.createElement('div')
  bar.style.cssText = 'background:#fff;border-top:1.5px solid #a5d8ef;flex-shrink:0;padding:10px 14px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;'
  const left = document.createElement('div')
  left.innerHTML = `
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#6b7280;font-weight:700;margin-bottom:1px">Becsült ajánlat</div>
    <div style="font-size:20px;font-weight:900;color:#0e1c2e;letter-spacing:-1px;line-height:1">${huf(EST.mid)}</div>`
  const btn = document.createElement('button')
  btn.textContent = 'Elküldés a tulajdonosnak →'
  btn.style.cssText = 'background:linear-gradient(135deg,#29abe2,#0d7aaf);color:#fff;border:none;border-radius:10px;padding:10px 15px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 3px 10px rgba(41,171,226,.4);flex-shrink:0;'
  btn.onclick = () => { showModal = true; render() }
  bar.appendChild(left); bar.appendChild(btn)
  return bar
}

  card.className = 'modal-card'

              <div style="font-size:12.5px;color:#6b7280;margin-top:2px">szalai.monika@gmail.com</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
                <span style="font-size:12px;font-weight:700;color:#0d7aaf;background:#e8f6fd;padding:3px 10px;border-radius:20px">📞 06 30 215 8844</span>
              </div>
            </div>
          </div>
        </div>

        <div style="padding:12px 16px;border-bottom:1px solid #e5e7eb;background:#fff">

            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:32px;height:32px;border-radius:8px;background:#e8f6fd;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">📍</div>
              <div>
                <div style="font-size:9.5px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;font-weight:600">Érdeklődő helyzete</div>

            </div>

              <div style="font-size:9.5px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;font-weight:600">Önöktől</div>

          <div style="display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:8px 12px">

                  <div style="font-size:9.5px;color:#0d4a6e;font-weight:600">${esc(e.label)}</div>
